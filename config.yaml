# ClawMax project configuration
# Non-sensitive settings only. Secrets such as API keys belong in .env or Hermes secret config.

project:
  name: ClawMax
  timezone: Asia/Shanghai
  language: zh-CN

schedule:
  daily_run_time: "06:00"

outputs:
  reports_dir: reports
  articles_dir: articles
  report_filename: technical-report.md
  sources_filename: sources.json
  brief_filename: brief.json
  image_prompts_filename: image-prompts.json
  image_assets_filename: image-assets.json
  images_dirname: images
  article_filename: wechat-draft.md
  final_article_filename: final-wechat-article.md
  html_preview_filename: wechat-preview.html
  article_json_filename: article.json
  metadata_filename: metadata.json
  review_notes_filename: review-notes.md

agents:
  technical_report:
    enabled: true
    profile: technicalreportagent
    skills:
      - ai-technical-report
      - daily-ai-media-pipeline
    include_images: true
    min_source_images_per_report: 3
    max_images_per_report: 8
  wechat_article:
    enabled: true
    profile: wechatarticleagent
    skills:
      - wechat-article-drafting
      - daily-ai-media-pipeline
    include_images: true
    min_images_per_article: 5
    max_images_per_article: 5
    min_ai_generated_images_per_article: 1
    min_source_derived_images_per_article: 3
    max_cover_images_per_article: 1
    max_generated_svg_images_per_article: 0
    require_ai_generated_image: true
    require_local_image_files: true
    require_source_derived_images: true
    fail_if_image_generation_fails: true
    fail_if_source_images_missing: true

image_gen:
  provider: openai
  model: gpt-image-2-medium
  default_quality: medium
  default_size: 1536x1024
  output_subdir: images
  save_prompts: true
  artifact_manifest: image-assets.json
  min_required_generated_images: 1
  min_source_derived_images_per_article: 3
  min_images_per_article: 5
  max_images_per_article: 5
  ai_image_required_suffixes:
    - .png
    - .jpg
    - .jpeg
    - .webp
  forbid_generated_svg_placeholders: true

research:
  tracked_companies:
    - OpenAI
    - Anthropic
    - Google DeepMind
    - Meta AI
    - xAI
    - Mistral
    - DeepSeek
  tracked_topics:
    - agents
    - reasoning
    - multimodal models
    - code generation
    - AI infra
    - embodied AI
    - robotics

content:
  wechat_sections:
    - AI 前沿
    - 浪里淘金
  require_human_review: true

publishing:
  wechat_mp:
    enabled: false
    # draft_only means the project may create a WeChat official-account draft,
    # but must not publish or mass-send automatically.
    mode: draft_only
    auto_publish: false
    require_human_approval: true
    default_author: "ClawMax"
    digest_max_chars: 120
    manifest_filename: wechat-publish.json
